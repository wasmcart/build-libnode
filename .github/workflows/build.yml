name: Build libnode

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y python3 g++ make
      - name: Build
        run: ./build.sh
      - name: Package
        run: cd out/linux-x86_64 && tar czf ../../libnode-linux-x86_64.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: libnode-linux-x86_64
          path: libnode-linux-x86_64.tar.gz

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y python3 g++ make
      - name: Build
        run: ./build.sh
      - name: Package
        run: cd out/linux-aarch64 && tar czf ../../libnode-linux-aarch64.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: libnode-linux-aarch64
          path: libnode-linux-aarch64.tar.gz

  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: ./build.sh
      - name: Package
        run: cd out/macos-x86_64 && tar czf ../../libnode-macos-x86_64.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: libnode-macos-x86_64
          path: libnode-macos-x86_64.tar.gz

  build-macos-aarch64:
    runs-on: macos-15
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: JOBS=1 ./build.sh
      - name: Package
        run: cd out/macos-aarch64 && tar czf ../../libnode-macos-aarch64.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: libnode-macos-aarch64
          path: libnode-macos-aarch64.tar.gz

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: choco install python3 nasm -y
      - name: Read version
        id: ver
        shell: bash
        run: echo "node_version=$(cat NODE_VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Clone Node.js
        shell: bash
        run: git clone --depth 1 --branch "v${{ steps.ver.outputs.node_version }}" https://github.com/nodejs/node.git node-src
      - name: Build
        shell: cmd
        run: |
          cd node-src
          call vcbuild.bat release ltcg static no-cctest without-intl nonpm nocorepack
      - name: Merge libs
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          mkdir out\windows-x86_64
          dir /s /b node-src\out\Release\*.lib | findstr /v /i "cctest gtest node_mksnapshot bytecode_builtins_list_generator embedtest" > liblist.txt
          type liblist.txt
          lib.exe /OUT:out\windows-x86_64\libnode.lib @liblist.txt
      - name: Collect headers
        shell: bash
        run: |
          mkdir -p out/windows-x86_64/include
          cp -r node-src/src/node.h node-src/src/node_version.h node-src/src/node_api.h node-src/src/node_api_types.h \
                node-src/src/node_buffer.h node-src/src/js_native_api.h node-src/src/js_native_api_types.h \
                out/windows-x86_64/include/ 2>/dev/null || true
          cp -r node-src/deps/v8/include/* out/windows-x86_64/include/ 2>/dev/null || true
          cp -r node-src/deps/uv/include/* out/windows-x86_64/include/ 2>/dev/null || true
          cat NODE_VERSION > out/windows-x86_64/NODE_VERSION
          ls -lh out/windows-x86_64/libnode.lib
      - name: Package
        shell: bash
        run: cd out/windows-x86_64 && 7z a ../../libnode-windows-x86_64.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: libnode-windows-x86_64
          path: libnode-windows-x86_64.zip

  build-android-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y python3 g++ make
      - name: Build
        run: ./build-android.sh --ndk ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: Package
        run: cd out/android-aarch64 && tar czf ../../libnode-android-aarch64.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: libnode-android-aarch64
          path: libnode-android-aarch64.tar.gz

  release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64, build-android-aarch64]
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Read version
        id: ver
        run: echo "node_version=$(cat NODE_VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "libnode v${{ steps.ver.outputs.node_version }}"
          body: |
            Pre-built libnode static libraries for wasmcart.

            Built from Node.js v${{ steps.ver.outputs.node_version }} with:
            `--fully-static --without-npm --without-inspector --without-intl --without-corepack`

            Each archive contains `libnode.a` (or `.lib`), headers (Node.js + V8 + libuv), and a NODE_VERSION file.
            Link statically into your binary — no runtime .so/.dll dependency.
          files: |
            artifacts/libnode-linux-x86_64/*.tar.gz
            artifacts/libnode-linux-aarch64/*.tar.gz
            artifacts/libnode-macos-x86_64/*.tar.gz
            artifacts/libnode-macos-aarch64/*.tar.gz
            artifacts/libnode-windows-x86_64/*.zip
            artifacts/libnode-android-aarch64/*.tar.gz
